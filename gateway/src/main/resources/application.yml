spring:
  application:
    name: gateway
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: guilda-app
              uri: lb://GUILDA-APP
              predicates:
                - Path=/guilda-app/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: guilda-app
                    fallbackUri: forward:/fallback/guilda-app
            - id: ranking-service
              uri: lb://RANKING-SERVICE
              predicates:
                - Path=/ranking-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: ranking-service
                    fallbackUri: forward:/fallback/ranking-service

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"