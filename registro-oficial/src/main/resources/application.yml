spring:
  application:
    name: guilda-app
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres
    username: postgres
    password: postgres123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_schema: operacoes
  cloud:
    config:
      enabled: false
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  health:
    db:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
    endpoint:
      health:
        show-details: always

server:
  port: 8081

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      RANKING-SERVICE:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 2
